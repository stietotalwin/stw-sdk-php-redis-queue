name: Publish to Packagist

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  update-packagist:
    name: Update Packagist package
    runs-on: ubuntu-latest

    steps:
      - name: Request Packagist update
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
          PACKAGE_REPOSITORY: https://github.com/stietotalwin/stw-sdk-php-redis-queue
        run: |
          if [ -z "$PACKAGIST_USERNAME" ] || [ -z "$PACKAGIST_API_TOKEN" ]; then
            echo "PACKAGIST_USERNAME and PACKAGIST_API_TOKEN secrets are required." >&2
            exit 1
          fi

          curl --fail-with-body --show-error --silent \
            --request POST \
            --header "Content-Type: application/json" \
            --header "Authorization: Bearer ${PACKAGIST_USERNAME}:${PACKAGIST_API_TOKEN}" \
            --user-agent "stietotalwin/stw-sdk-php-redis-queue GitHub Actions (mailto:dev@stietotalwin.com)" \
            --data "{\"repository\":\"${PACKAGE_REPOSITORY}\"}" \
            https://packagist.org/api/update-package
